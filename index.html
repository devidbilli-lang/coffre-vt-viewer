<style>
:root{--bg:#f0f0f5;--surface:#fff;--border:#e0e0ec;--accent:#f26eff;--accent2:#d400e8;--green:#059669;--red:#dc2626;--text:#1a1a2e;--text-muted:#6b6b8a;--text-dim:#b0b0c8;--shadow:0 2px 12px rgba(242,110,255,0.08);}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border:2.5px solid var(--accent);border-radius:20px;padding:40px 48px;width:100%;max-width:400px;text-align:center;box-shadow:0 0 24px 6px rgba(242,110,255,0.4);}
@keyframes spin{to{transform:rotate(360deg);}}
/* LAYOUT */
.full-wrap{width:100vw;position:relative;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;padding:0 16px;}
.inner{max-width:100%;}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 18px;border-bottom:2px solid var(--border);}
.brand{display:flex;align-items:center;gap:14px;}
.brand-icon{width:52px;height:52px;border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(242,110,255,0.3);flex-shrink:0;}
.brand-name{font-size:26px;font-weight:900;letter-spacing:3px;}
.brand-sub{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.clock{font-size:22px;font-weight:800;letter-spacing:2px;color:var(--accent);background:#fff;border:2px solid var(--accent);padding:7px 18px;border-radius:10px;}
.conn-pill{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;background:#fff;border:1.5px solid var(--border);}
.conn-pill.ok{border-color:#86efac;color:var(--green);}
.conn-pill.ok::before{content:"●";color:#86efac;}
.conn-pill.load{border-color:#fcd34d;color:#d97706;}
.conn-pill.load::before{content:"●";color:#fcd34d;}
.conn-pill.err{border-color:#fca5a5;color:var(--red);}
.conn-pill.err::before{content:"●";color:#fca5a5;}
/* FILTERS */
.filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:20;background:var(--bg);padding:12px 0;border-bottom:1.5px solid var(--border);}
.filters input[type=text]{padding:10px 14px;font-size:13px;font-weight:600;background:#fff;border:1.5px solid rgba(242,110,255,0.35);border-radius:10px;font-family:'Montserrat',sans-serif;width:155px;}
.filters input[type=text]:focus{outline:none;border-color:var(--accent);}
.search-wrap{position:relative;}
.search-wrap input{padding-right:28px;}
.clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;}
.dropdown-list{position:absolute;top:calc(100%+4px);left:0;right:0;background:#fff;border:1.5px solid var(--accent);border-radius:10px;max-height:220px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 24px rgba(242,110,255,0.12);}
.dropdown-list.open{display:block;}
.dropdown-item{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;}
.dropdown-item:hover{background:#f0f0ff;color:var(--accent);}
.dropdown-item mark{background:none;color:var(--accent);font-weight:700;}
.btn-green{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:10px 18px;}
/* TABLE */
.rep-layout{display:grid;grid-template-columns:1fr 250px;gap:16px;align-items:start;margin-top:16px;}
.table-wrap{border-radius:12px;overflow:visible;border:1.5px solid var(--border);width:100%;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;table-layout:auto;}
thead tr{position:sticky;top:57px;z-index:10;}
thead th{background:linear-gradient(135deg,var(--accent),var(--accent2));padding:11px 6px;text-align:center;font-size:11px;font-weight:800;letter-spacing:0.5px;color:#fff;text-transform:uppercase;white-space:nowrap;}
thead th.th-tot{background:#86efac;color:#1a1a2e;}
thead th.th-note-a1{background:#97fdff;color:#000;font-size:14px;vertical-align:top;width:90px;min-width:90px;text-align:center;padding-top:10px;}
thead th.th-note-b1{background:#ffc572;color:#000;font-size:14px;vertical-align:top;width:90px;min-width:90px;text-align:center;padding-top:10px;}
thead th.th-note-c1{background:#feff93;color:#000;font-size:14px;vertical-align:top;width:90px;min-width:90px;text-align:center;padding-top:10px;}
thead th.th-note-d1{background:#ff5e5e;color:#fff;font-size:14px;vertical-align:top;width:90px;min-width:90px;text-align:center;padding-top:10px;}
.th-sub{font-size:10px;font-weight:600;color:inherit;display:block;margin-top:3px;text-transform:none;letter-spacing:0;white-space:normal;line-height:1.3;text-align:center;}
.col-note-libere{width:180px;min-width:180px;max-width:180px;}
tbody td{padding:10px 6px;text-align:center;border-bottom:1px solid var(--border);color:var(--text);font-weight:500;font-size:13px;white-space:nowrap;}
tbody td.td-note-lib{width:180px;min-width:180px;max-width:180px;white-space:normal;word-break:break-word;font-size:13px;text-align:center;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:nth-child(even){background:#f8f8fd;}
tbody tr:hover{background:#eeeeff;}
.td-zero{color:var(--text-dim);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:800;background:#86efac;color:#1a1a2e;}
.td-tot{font-weight:800;}
.empty{text-align:center;padding:48px;color:var(--text-muted);font-size:15px;font-weight:600;}
/* RIGHT CARDS */
.right-card{background:#fff;border:2px solid var(--accent);border-radius:16px;padding:20px;box-shadow:0 0 16px 4px rgba(242,110,255,0.5),0 0 48px 12px rgba(242,110,255,0.2);}
.right-card-title{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#f26eff;}
.pie-card{background:#fff;border:2px solid var(--accent);border-radius:16px;padding:20px;text-align:center;box-shadow:0 0 16px 4px rgba(242,110,255,0.5),0 0 48px 12px rgba(242,110,255,0.2);}
</style>
</head>

<script>
var BASE='https://script.google.com/macros/s/AKfycby3ijsI1oE2t_lObb9hZ_TRh_JKCQ1VzPHrVBA6k3fxR2sSQ2ZzPvStmzNAe-93chPlPw/exec';
var NOTE_COLORS={'A1':'#97fdff','B1':'#ffc572','C1':'#feff93','D1':'#ff5e5e'};
var NOTE_DEFAULT='#f26eff';
var tid=0,allRows=[],rHeaders=[],noteDescMap={},artDescMap={},artCollMap={},artBrandMap={};
var dateList=[],selectedDate='';

setInterval(function(){var n=new Date();document.getElementById('clk').textContent=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2);},1000);
function setConn(s,t){var e=document.getElementById('conn');e.className='conn-pill '+s;document.getElementById('conn-txt').textContent=t;}
function gp(action,params,cb){
  var fn='_cb'+(tid++);var el=document.createElement('script');
  var q=new URLSearchParams(Object.assign({action:action,callback:fn,t:Date.now()},params||{})).toString();
  el.src=BASE+'?'+q;
  window[fn]=function(d){delete window[fn];el.remove();cb(d);};
  el.onerror=function(){delete window[fn];el.remove();cb({ok:false,error:'Errore'});};
  document.head.appendChild(el);
}
function formatDate(v){
  if(!v&&v!==0)return'';var s=String(v);
  if(s.match(/^\d{2}\/\d{2}\/\d{4}/))return s.slice(0,10);
  if(s.indexOf('T')>0){var d=new Date(s);var loc=new Date(d.getTime()-d.getTimezoneOffset()*60000);var p=loc.toISOString().slice(0,10).split('-');return p[2]+'/'+p[1]+'/'+p[0];}
  var p=s.slice(0,10).split('-');if(p.length===3&&p[0].length===4)return p[2].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/'+p[0];
  return s.slice(0,10);
}
function toISO(d){var p=d.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d;}
function getNoteColor(cod){return NOTE_COLORS[cod.toUpperCase()]||NOTE_DEFAULT;}
function getNoteThClass(cod){var u=cod.toUpperCase();if(u==='A1')return'th-note-a1';if(u==='B1')return'th-note-b1';if(u==='C1')return'th-note-c1';if(u==='D1')return'th-note-d1';return'';}
var HIDDEN=['note','codice','notes'];
function isHidden(col){return HIDDEN.indexOf(col.toLowerCase())>=0;}
function isNoteLibere(col){return col.toLowerCase()==='note libere';}
function getNoteIndices(){
  var r=[];var artIdx=rHeaders.indexOf('Articolo');var start=artIdx>=0?artIdx+1:4;
  for(var i=start;i<rHeaders.length;i++){if(rHeaders[i]==='Totale')break;if(!isHidden(rHeaders[i]))r.push(i);}
  return r;
}
// FILTER DROPDOWNS
var fDropLists={rep:[],art:[],cluster:[],brand:[]};
function buildFDropLists(){
  var linee={},arti={},clusters={},brands={};
  var artIdx=rHeaders.indexOf('Articolo');var lineaIdx=rHeaders.indexOf('Linea');
  var ni=getNoteIndices();
  allRows.forEach(function(r){
    if(r[1])linee[String(r[1])]=1;
    var cod=artIdx>=0?String(r[artIdx]||''):'';
    if(cod){var desc=artDescMap[cod]||'';var coll=artCollMap[cod]||'';var label=desc+(coll?' — '+coll:'');if(label.trim())arti[label]=1;var brand=artBrandMap[cod]||'';if(brand)brands[brand]=1;}
    ni.forEach(function(i){if((parseFloat(r[i])||0)>0)clusters[rHeaders[i]]=1;});
  });
  Object.keys(artDescMap).forEach(function(k){if(artDescMap[k]){var coll=artCollMap[k]||'';var label=artDescMap[k]+(coll?' — '+coll:'');arti[label]=1;}});
  Object.keys(artBrandMap).forEach(function(k){if(artBrandMap[k])brands[artBrandMap[k]]=1;});
  Object.keys(noteDescMap).forEach(function(k){clusters[k]=1;});
  fDropLists.rep=Object.keys(linee).sort();
  fDropLists.art=Object.keys(arti).sort();
  fDropLists.cluster=Object.keys(clusters).sort();
  fDropLists.brand=Object.keys(brands).sort();
}
function filterFDrop(type){
  var el=document.getElementById('r-'+type);if(!el)return;
  var txt=el.value.toLowerCase();
  var list=document.getElementById('fdrop-'+type);if(!list)return;
  var items=(fDropLists[type]||[]).filter(function(v){return v.toLowerCase().indexOf(txt)>=0;});
  list.innerHTML='';
  items.forEach(function(v){
    var div=document.createElement('div');div.className='dropdown-item';div.textContent=v;
    div.addEventListener('mousedown',function(){el.value=v;list.classList.remove('open');filtra();});
    list.appendChild(div);
  });
  if(!items.length)list.innerHTML='<div class="dropdown-item" style="color:var(--text-dim)">Nessun risultato</div>';
  list.classList.add('open');
}
function openFDrop(type){filterFDrop(type);}
function blurFDrop(type){setTimeout(function(){var l=document.getElementById('fdrop-'+type);if(l)l.classList.remove('open');},150);}
function clearFDrop(type){var el=document.getElementById('r-'+type);if(el)el.value='';filtra();}

function buildDateDrop(){
  var dates={};allRows.forEach(function(r){var d=formatDate(r[0]);if(d)dates[d]=1;});
  dateList=Object.keys(dates).sort(function(a,b){return toISO(b).localeCompare(toISO(a));});
}
function filterDataDrop(){
  var txt=document.getElementById('r-data-txt').value.toLowerCase();
  var list=document.getElementById('drop-data');
  list.innerHTML='';
  dateList.filter(function(d){return d.indexOf(txt)>=0;}).forEach(function(d){
    var div=document.createElement('div');div.className='dropdown-item';div.textContent=d;
    div.addEventListener('mousedown',function(){selectData(d);});list.appendChild(div);
  });
  list.classList.add('open');
}
function openDataDrop(){filterDataDrop();}
function blurDataDrop(){setTimeout(function(){document.getElementById('drop-data').classList.remove('open');},150);}
function selectData(d){selectedDate=d;document.getElementById('r-data-txt').value=d;document.getElementById('drop-data').classList.remove('open');filtra();}
function clearDataFiltro(){selectedDate='';document.getElementById('r-data-txt').value='';filtra();}

function doLogin(){
  var pwd=document.getElementById('pwd-input').value;
  var err=document.getElementById('login-err');err.style.display='none';
  if(!pwd){err.textContent='Inserisci la password.';err.style.display='block';return;}
  var btn=document.getElementById('login-btn');
  var spinner=document.getElementById('login-spinner');
  btn.style.display='none';spinner.style.display='block';
  gp('get_password',{},function(d){
    btn.style.display='block';spinner.style.display='none';
    if(!d.ok){err.textContent='Errore connessione.';err.style.display='block';return;}
    if(pwd===d.password){
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app-screen').style.display='block';
      loadAll();
    } else {
      err.textContent='Password errata.';err.style.display='block';
      document.getElementById('pwd-input').value='';
    }
  });
}
function logout(){
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pwd-input').value='';
}

function loadAll(){
  setConn('load','Caricamento...');
  gp('init',{},function(d){
    if(!d.ok){setConn('err','Errore');return;}
    setConn('ok','Connesso');
    (d.articoli||[]).forEach(function(r,i){if(i===0||!r[0])return;var c=String(r[0]);artDescMap[c]=r[1]?String(r[1]):'';artCollMap[c]=r[2]?String(r[2]):'';artBrandMap[c]=r[3]?String(r[3]):'';});
    (d.cluster||[]).forEach(function(r,i){if(i===0||!r[0])return;noteDescMap[String(r[0])]=r[1]?String(r[1]):'';});
    loadR();loadBorseFerme();
  });
}

function loadR(){
  gp('read_riepilogo',{},function(d){
    if(!d.ok)return;
    rHeaders=d.headers||[];
    allRows=(d.rows||[]).filter(function(r){return r[0];});
    allRows.sort(function(a,b){return toISO(formatDate(b[0])).localeCompare(toISO(formatDate(a[0])));});
    renderHead();buildDateDrop();buildFDropLists();filtra();
  });
}

function renderHead(){
  var ni=getNoteIndices();
  var h='<tr>';
  for(var i=0;i<rHeaders.length;i++){
    var col=rHeaders[i];if(isHidden(col))continue;
    if(col==='Totale'){h+='<th class="th-tot">Totale</th>';continue;}
    if(isNoteLibere(col)){h+='<th class="col-note-libere" style="background:linear-gradient(135deg,#f26eff,#d400e8);color:#fff;">Note Libere</th>';continue;}
    if(ni.indexOf(i)>=0){var desc=noteDescMap[col]||'';h+='<th class="'+getNoteThClass(col)+'">'+col+(desc?'<span class="th-sub">'+desc+'</span>':'')+'</th>';}
    else{h+='<th>'+col+'</th>';}
  }
  h+='</tr>';document.getElementById('tbl-head').innerHTML=h;
}

function filtra(){
  var rep=document.getElementById('r-rep').value.toLowerCase();
  var art=document.getElementById('r-art').value.toLowerCase();
  var cluster=document.getElementById('r-cluster').value.toLowerCase();
  var artIdx=rHeaders.indexOf('Articolo');var lineaIdx=rHeaders.indexOf('Linea');
  var ni=getNoteIndices();
  var f=allRows.filter(function(r){
    if(rep){var lv=lineaIdx>=0?String(r[lineaIdx]||'').toLowerCase():'';var nv=String(r[1]||'').toLowerCase();if(lv.indexOf(rep)<0&&nv.indexOf(rep)<0)return false;}
    if(art){var cod=String(r[artIdx>=0?artIdx:3]||'');var desc=(artDescMap[cod]||'').toLowerCase();var coll2=(artCollMap[cod]||'').toLowerCase();if(desc.indexOf(art)<0&&cod.toLowerCase().indexOf(art)<0&&coll2.indexOf(art)<0)return false;}
    if(cluster){var found=false;ni.forEach(function(i){var cn=rHeaders[i].toLowerCase();var qty=parseFloat(r[i])||0;if(cn.indexOf(cluster)>=0&&qty>0)found=true;var dc=(noteDescMap[rHeaders[i]]||'').toLowerCase();if(dc.indexOf(cluster)>=0&&qty>0)found=true;});if(!found)return false;}
    var brand=document.getElementById('r-brand')?document.getElementById('r-brand').value.toLowerCase():'';
    if(brand){var cod2=String(r[artIdx>=0?artIdx:3]||'');var br=(artBrandMap[cod2]||'').toLowerCase();if(br.indexOf(brand)<0)return false;}
    if(selectedDate&&formatDate(r[0])!==selectedDate)return false;
    return true;
  });
  var gDate=selectedDate||(dateList.length?dateList[0]:'');
  var fG=allRows.filter(function(r){return formatDate(r[0])===gDate;});
  renderPie(fG);renderBarChart(fG);
  var tb=document.getElementById('tb');
  if(!f.length){tb.innerHTML='<tr><td colspan="'+(rHeaders.filter(function(h){return!isHidden(h);}).length)+'" class="empty">Nessun dato trovato</td></tr>';return;}
  tb.innerHTML='';
  f.forEach(function(r){
    var dStr=formatDate(r[0]);
    var tr=document.createElement('tr');
    for(var i=0;i<rHeaders.length;i++){
      var col=rHeaders[i],val=r[i]!==undefined?r[i]:'';
      if(isHidden(col))continue;
      var td=document.createElement('td');
      if(col==='Data'){td.textContent=dStr;}
      else if(col==='Totale'){td.className='td-tot';td.innerHTML='<span class="badge">'+(parseFloat(val)||0)+'</span>';}
      else if(isNoteLibere(col)){td.className='td-note-lib';td.textContent=String(val||'');}
      else if(col==='Articolo'){var coll=artCollMap[String(val)]||'';var desc2=artDescMap[String(val)]||'';td.style.maxWidth='160px';td.innerHTML=String(val)+(desc2?'<br><span style="color:var(--text-muted);font-size:11px;">'+desc2+'</span>':'')+(coll?'<br><span style="color:#e91e8c;font-size:11px;font-weight:700;">'+coll+'</span>':'');}
      else if(ni.indexOf(i)>=0){var n=parseFloat(val)||0,u=col.toUpperCase();if(n===0){td.className='td-zero';td.textContent='-';}else{var bg=getNoteColor(col);var fg=u==='D1'?'#fff':'#000';td.innerHTML='<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:800;background:'+bg+';color:'+fg+';">'+n+'</span>';}}
      else{td.textContent=String(val);}
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  });
}

function loadBorseFerme(){
  gp('read_borse_ferme',{},function(d){
    var div=document.getElementById('borse-chart');if(!div)return;
    if(!d.ok||!d.rows||!d.rows.length){div.innerHTML='<div style="color:var(--text-muted);font-size:12px;text-align:center;">Nessun dato</div>';return;}
    var rows=d.rows.filter(function(r){return r[0]&&(parseFloat(r[2])||0)>0;});
    rows.sort(function(a,b){return(parseFloat(b[2])||0)-(parseFloat(a[2])||0);});
    var tot=rows.reduce(function(s,r){return s+(parseFloat(r[2])||0);},0);
    var badge=document.getElementById('borse-total-badge');
    if(badge){badge.textContent=tot;badge.style.display=tot>0?'inline-flex':'none';}
    div.innerHTML=rows.map(function(r){var cod=String(r[0]);var desc=r[1]?String(r[1]):(artDescMap[cod]||'');var qta=parseFloat(r[2])||0;
      return'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid var(--border);"><div style="flex:1;min-width:0;padding-right:6px;"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+cod+'</div>'+(desc?'<div style="font-size:10px;color:var(--text-muted);">'+desc+'</div>':'')+'</div><span style="background:#3b82f6;color:#fff;font-size:12px;font-weight:800;padding:2px 8px;border-radius:20px;flex-shrink:0;">'+qta+'</span></div>';
    }).join('');
  });
}

function renderBarChart(rows){
  var barDiv=document.getElementById('bar-chart');if(!barDiv)return;
  var artIdx=rHeaders.indexOf('Articolo');var totIdx=rHeaders.indexOf('Totale');if(artIdx<0||totIdx<0)return;
  var artTotals={};
  rows.forEach(function(r){var cod=String(r[artIdx]||'').trim();var tot=parseFloat(r[totIdx])||0;if(!cod||tot<=0)return;artTotals[cod]=(artTotals[cod]||0)+tot;});
  var entries=Object.keys(artTotals).map(function(k){return{cod:k,tot:artTotals[k]};}).sort(function(a,b){return b.tot-a.tot;});
  if(!entries.length){barDiv.innerHTML='<div style="color:var(--text-muted);font-size:12px;text-align:center;">Nessun dato</div>';return;}
  barDiv.innerHTML=entries.map(function(e){var desc=artDescMap[e.cod]||'';var coll=artCollMap[e.cod]||'';
    return'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid var(--border);"><div style="flex:1;min-width:0;padding-right:6px;"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+e.cod+'</div>'+(desc?'<div style="font-size:10px;color:var(--text-muted);">'+desc+'</div>':'')+(coll?'<div style="font-size:10px;color:#e91e8c;font-weight:700;">'+coll+'</div>':'')+'</div><span style="background:#f26eff;color:#fff;font-size:12px;font-weight:800;padding:2px 8px;border-radius:20px;flex-shrink:0;">'+e.tot+'</span></div>';
  }).join('');
}

function renderPie(rows){
  var canvas=document.getElementById('pieChart');var legend=document.getElementById('pie-legend');if(!canvas)return;
  var ni=getNoteIndices();if(!ni.length)return;

  if(!total){ctx.fillStyle='#e8e8f0';ctx.beginPath();ctx.arc(100,100,90,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(100,100,44,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();legend.innerHTML='<div style="font-size:12px;color:var(--text-muted);text-align:center">Nessun dato</div>';return;}
  var startAngle=-Math.PI/2,cx=100,cy=100,r=90;
  keys.forEach(function(k){var slice=(totals[k]/total)*Math.PI*2;var col=getNoteColor(k);ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,startAngle,startAngle+slice);ctx.closePath();ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();startAngle+=slice;});
  ctx.beginPath();ctx.arc(cx,cy,44,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.font='bold 18px Montserrat,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(total,cx,cy-12);
  var img=new Image();img.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmlld0JveD0iMCAwIDUxMiA1MTIiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGRlZnM+CiAgICA8bGluZWFyR3JhZGllbnQgaWQ9ImJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3R5bGU9InN0b3AtY29sb3I6I2YyNmVmZiIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiNkNDAwZTgiLz4KICAgIDwvbGluZWFyR3JhZGllbnQ+CiAgPC9kZWZzPgogIDxyZWN0IHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiByeD0iOTYiIGZpbGw9InVybCgjYmcpIi8+CiAgPHJlY3QgeD0iMTI4IiB5PSIyNDgiIHdpZHRoPSIyNTYiIGhlaWdodD0iMTg0IiByeD0iMjgiIGZpbGw9IndoaXRlIi8+CiAgPHBhdGggZD0iTTE2OCAyNDggVjE4MCBDMTY4IDEwOCAzNDQgMTA4IDM0NCAxODAgVjI0OCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI0MCIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBmaWxsPSJub25lIi8+CiAgPGNpcmNsZSBjeD0iMjU2IiBjeT0iMzMwIiByPSIzMiIgZmlsbD0iI2YyNmVmZiIvPgogIDxyZWN0IHg9IjI0MCIgeT0iMzQ2IiB3aWR0aD0iMzIiIGhlaWdodD0iMzYiIHJ4PSI4IiBmaWxsPSIjZjI2ZWZmIi8+Cjwvc3ZnPgo=';
  img.onload=function(){ctx.drawImage(img,cx-12,cy+4,24,24);};
  legend.innerHTML='<table style="width:100%;border-collapse:collapse;margin-top:14px;font-size:13px;"><thead><tr>'+keys.map(function(k){var col=getNoteColor(k);var fg=k==='D1'?'#fff':'#000';return'<th style="background:'+col+';color:'+fg+';padding:6px 10px;font-weight:800;">'+k+'</th>';}).join('')+'</tr></thead><tbody><tr>'+keys.map(function(k){var col=getNoteColor(k);var fg=k==='D1'?'#fff':'#000';return'<td style="text-align:center;padding:8px 10px;font-weight:800;color:'+fg+';background:'+col+';">'+totals[k]+'</td>';}).join('')+'</tr></tbody></table>';
  loadBorseFerme();
}

function syncData(){
  var icon=document.getElementById('sync-icon');
  setConn('load','Sincronizzazione...');
  icon.style.transition='transform 1s linear';
  icon.style.transform='rotate(720deg)';
  setTimeout(function(){icon.style.transition='';icon.style.transform='rotate(0deg)';},1000);
  gp('read_riepilogo',{},function(d){
    if(!d.ok){setConn('err','Errore sync');return;}
    rHeaders=d.headers||[];
    var newRows=(d.rows||[]).filter(function(r){return r[0];});
    newRows.sort(function(a,b){return toISO(formatDate(b[0])).localeCompare(toISO(formatDate(a[0])));});
    allRows=newRows;
    renderHead();buildDateDrop();buildFDropLists();filtra();
    setConn('ok','Connesso');
  });
  loadBorseFerme();
}

// Auto-sync ogni 60 secondi
setInterval(function(){
  if(document.getElementById('app-screen').style.display!=='none') syncData();
},60*1000);
</script>
